name: Website Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check Website
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://patrol.mggintergroup.com)

          echo "Status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            curl -X POST https://notify-api.line.me/api/notify \
            -H "Authorization: Bearer ${{ secrets.LINE_TOKEN }}" \
            -F "message=🚨 Website DOWN! Status: $STATUS"
          fi
