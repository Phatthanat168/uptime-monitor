name: LINE Test

on:
  workflow_dispatch:   # กดรันเอง

jobs:
  test-line:
    runs-on: ubuntu-latest

    steps:
      - name: Send LINE Notification
        run: |
          echo "=============================="
          echo "Sending test message to LINE..."
          echo "Time: $(date)"
          echo "=============================="

          curl --retry 3 --retry-delay 5 --fail -X POST https://notify-api.line.me/api/notify \
          -H "Authorization: Bearer ${{ secrets.LINE_TOKEN }}" \
          -F "message=✅ TEST: GitHub Actions ส่ง LINE สำเร็จ!"

          echo "Done"
