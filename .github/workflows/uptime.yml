name: LINE Group Test

on:
  workflow_dispatch:

jobs:
  send-line:
    runs-on: ubuntu-latest

    steps:
      - name: Send message to LINE Group
        run: |
          TOKEN="${{ secrets.LINE_TOKEN }}"
          GROUP_ID="Cabc85afaec5c2182c8be2175ff57f226"

          echo "Sending to group..."

          curl -X POST https://api.line.me/v2/bot/message/push \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $TOKEN" \
          -d "{
            \"to\": \"$GROUP_ID\",
            \"messages\": [
              {
                \"type\": \"text\",
                \"text\": \"🔥 แจ้งเตือนจาก GitHub (เข้ากลุ่มสำเร็จ!)\"
              }
            ]
          }"

          echo "✅ Done"
