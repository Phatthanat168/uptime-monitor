name: Website Monitor (LINE Group TH)

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Website + LINE Alert
        run: |
          URL="https://patrol.mggintergroup.com/"
          TOKEN="${{ secrets.LINE_TOKEN }}"
          GROUP_ID="Cabc85afaec5c2182c8be2175ff57f226"
          
          echo "Checking: $URL at $(date)"
          
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" "$URL" --max-time 10)
          echo "Status: $HTTP_CODE"
          
          if [ -f status.txt ]; then
            OLD_STATUS=$(cat status.txt)
          else
            OLD_STATUS="unknown"
          fi
          
          send_line() {
            curl -s -X POST https://api.line.me/v2/bot/message/push \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $TOKEN" \
              -d "{\"to\":\"$GROUP_ID\",\"messages\":[{\"type\":\"text\",\"text\":\"$1\"}]}"
          }
          
          if [ "$HTTP_CODE" != "200" ]; then
            if [ "$OLD_STATUS" != "down" ]; then
              send_line "🔴 DOWN! $URL - Status: $HTTP_CODE"
              echo "down" > status.txt
            fi
          else
            if [ "$OLD_STATUS" = "down" ]; then
              send_line "🟢 RECOVERED! $URL - Status: 200"
              echo "up" > status.txt
            fi
          fi
