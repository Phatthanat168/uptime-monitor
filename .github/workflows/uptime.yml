name: Website Monitor (LINE Group)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check Website + Notify LINE
        run: |
          URL="https://patrol.mggintergroup.com/"
          TOKEN="${{ secrets.LINE_TOKEN }}"
          GROUP_ID="Cabc85afaec5c2182c8be2175ff57f226"

          echo "Checking: $URL"

          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL || echo "000")

          echo "Status: $STATUS"

          # 🚨 แจ้งทันทีถ้าไม่ใช่ 200
          if [ "$STATUS" != "200" ]; then

            echo "Send alert"

            curl -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d "{
              \"to\": \"$GROUP_ID\",
              \"messages\": [
                {
                  \"type\": \"text\",
                  \"text\": \"🚨 WEBSITE ERROR!\n$URL\nStatus: $STATUS\"
                }
              ]
            }"
          else
            echo "OK"
          fi
