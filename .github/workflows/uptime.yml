name: Website Monitor (LINE Group TH)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Website + Notify LINE
        run: |
          URL="https://patrol.mggintergroup.com/"
          TOKEN="${{ secrets.LINE_TOKEN }}"
          GROUP_ID="Cabc85afaec5c2182c8be2175ff57f226"

          echo "Checking: $URL"

          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL || echo "000")

          echo "Status: $STATUS"

          # โหลดสถานะก่อนหน้า
          if [ -f status.txt ]; then
            PREV=$(cat status.txt)
          else
            PREV="unknown"
          fi

          echo "Previous: $PREV"

          # =========================
          # 🚨 เว็บล่ม / error
          # =========================
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "404" ] && [ "$PREV" != "down" ]; then

            echo "DOWN detected"

            curl -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d "{
              \"to\": \"$GROUP_ID\",
              \"messages\": [
                {
                  \"type\": \"text\",
                  \"text\": \"🚨 แจ้งเตือน: เว็บไซต์ล่ม / มีปัญหา\nURL: $URL\nStatus: $STATUS\"
                }
              ]
            }"

            echo "down" > status.txt
          fi

          # =========================
          # ✅ เว็บกลับมา (ครั้งแรก / จาก down)
          # =========================
          if { [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; } && { [ "$PREV" = "down" ] || [ "$PREV" = "unknown" ]; }; then

            echo "RECOVER detected"

            curl -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d "{
              \"to\": \"$GROUP_ID\",
              \"messages\": [
                {
                  \"type\": \"text\",
                  \"text\": \"✅ เว็บไซต์พร้อมใช้งาน\nURL: $URL\nStatus: $STATUS\"
                }
              ]
            }"

            echo "up" > status.txt
          fi

      - name: Commit status
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add status.txt || true
          git commit -m "update status" || true
          git push || true
