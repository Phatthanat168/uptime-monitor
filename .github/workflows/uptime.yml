name: Website Monitor (LINE Group TH)

on:
  schedule:
    - cron: '* * * * *'   # ทุก 5 นาที (ลดการ consume API)
  workflow_dispatch:         # รัน manual ได้
  push:                      # เมื่อมี push ใหม่ (ช่วยปลุก auto)
    branches: [ main, master ]

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # ให้ push กลับไปได้

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # ดึง history ทั้งหมด

      - name: Check Website + Notify LINE
        env:
          TOKEN: ${{ secrets.LINE_TOKEN }}
          GROUP_ID: "Cabc85afaec5c2182c8be2175ff57f226"
          URL: "https://patrol.mggintergroup.com/"
        run: |
          echo "=========================="
          echo "Checking: $URL"
          echo "Time: $(date)"
          echo "=========================="

          # ดึง HTTP status code (รองรับ timeout)
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL" --max-time 10 --connect-timeout 5 || echo "000")
          echo "Status: $STATUS"

          # โหลดสถานะก่อนหน้า
          if [ -f status.txt ]; then
            PREV=$(cat status.txt)
          else
            PREV="unknown"
          fi
          echo "Previous: $PREV"

          # ฟังก์ชันส่งข้อความ (Messaging API)
          send_line_message() {
            local message="$1"
            curl -s -X POST https://api.line.me/v2/bot/message/push \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $TOKEN" \
              -d "{
                \"to\": \"$GROUP_ID\",
                \"messages\": [
                  {
                    \"type\": \"text\",
                    \"text\": \"$message\"
                  }
                ]
              }"
          }

          # =========================
          # 🚨 DOWN (status ไม่ใช่ 200/404)
          # =========================
          if [[ "$STATUS" != "200" && "$STATUS" != "404" && "$PREV" != "down" ]]; then
            echo "🚨 DOWN detected - Sending alert..."
            
            MESSAGE="🚨 WEBSITE DOWN! 🚨
            
URL: $URL
Status: $HTTP_STATUS
Time: $(date '+%Y-%m-%d %H:%M:%S')

Please check immediately!"
            
            send_line_message "$MESSAGE"
            echo "down" > status.txt
            echo "Alert sent"
          fi

          # =========================
          # ✅ RECOVER (กลับมา online)
          # =========================
          if [[ "$STATUS" == "200" || "$STATUS" == "404" ]] && [[ "$PREV" == "down" || "$PREV" == "unknown" ]]; then
            echo "✅ RECOVER detected - Sending notification..."
            
            MESSAGE="✅ WEBSITE ONLINE ✅
            
URL: $URL
Status: $STATUS
Time: $(date '+%Y-%m-%d %H:%M:%S')

Website is back to normal."
            
            send_line_message "$MESSAGE"
            echo "up" > status.txt
            echo "Recovery notification sent"
          fi
          
          # กรณี status ปกติ (200/404) และก่อนหน้าก็ปกติ
          if [[ "$STATUS" == "200" || "$STATUS" == "404" ]] && [[ "$PREV" == "up" || "$PREV" == "unknown" ]]; then
            echo "✅ Website is normal (status: $STATUS)"
            if [ ! -f status.txt ] || [ "$PREV" != "up" ]; then
              echo "up" > status.txt
            fi
          fi

      - name: Commit and push status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes เพื่อ避免 conflict
          git pull origin main --rebase || true
          
          # commit เฉพาะเมื่อมี change
          if [ -f status.txt ]; then
            git add status.txt
            git diff --staged --quiet || git commit -m "Update website status [skip ci]"
            git push || true
          fi
